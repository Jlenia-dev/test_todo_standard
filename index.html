<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test di usabilità</title>
</head>
<body>
  <button id="apri" style="font-size:18px; padding:12px 24px;">Apri le 4 schede</button>
  <script>
    const urls = [
      "https://www.figma.com/proto/LINK-1",
      "https://www.figma.com/proto/LINK-2",
      "https://www.figma.com/proto/LINK-3",
      "https://www.figma.com/proto/LINK-4"
    ];
    document.getElementById("apri").addEventListener("click", () => {
      urls.forEach(url => window.open(url, "_blank"));
    });
  </script>
</body>
</html>
